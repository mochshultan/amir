amcl:
  ros__parameters:
    # 1. Arti: Sinkronisasi waktu (clock) dari environment.
    # 2. Dampak: N/A. Dampak salah: navigasi gagal total karena TF timeout.
    # 3. Range: True (Simulasi) / False (Hardware Asli)
    use_sim_time: false

    # 1. Arti: Perkiraan error odometri rotasi akibat pergerakan rotasi.
    # 2. Dampak: Naik: Partikel menyebar luas saat rotasi (odometri buruk). Turun: Partikel terpusat.
    # 3. Range: 0.0 - 1.0 (DDMR: ~0.1-0.2)
    alpha1: 0.2

    # 1. Arti: Perkiraan error rotasi akibat pergerakan translasi (selip roda saat lurus).
    # 2. Dampak: Naik: Robot kurang percaya arah saat jalan lurus. Turun: Pede jalan lurus.
    # 3. Range: 0.0 - 1.0 (DDMR: ~0.1-0.2)
    alpha2: 0.2

    # 1. Arti: Perkiraan error translasi akibat pergerakan translasi.
    # 2. Dampak: Naik: Toleransi roda slip/ngesot maju tinggi. Turun: Menganggap jarak maju presisi.
    # 3. Range: 0.0 - 1.0 (DDMR: ~0.1-0.2)
    alpha3: 0.2

    # 1. Arti: Perkiraan error translasi akibat rotasi (poros putar goyang).
    # 2. Dampak: Naik: Partikel bergeser linier saat robot putar. Turun: Dianggap mutar di tempat.
    # 3. Range: 0.0 - 1.0 (DDMR: ~0.1-0.2)
    alpha4: 0.2

    # 1. Arti: Error translasi akibat strafing (gerak samping).
    # 2. Dampak: Hanya untuk robot omni. Untuk DDMR abaikan.
    # 3. Range: Abaikan (0.2)
    alpha5: 0.2

    # 1. Arti: Titik pusat referensi tf robot.
    # 2. Dampak: Jika salah, tf tree putus dan tidak bisa navigasi.
    # 3. Range: "base_link" atau "base_footprint"
    base_frame_id: "base_link"

    # 1. Arti: Jarak rintangan untuk mulai mengabaikan sinar Lidar (filter dinamis).
    # 2. Dampak: Naik: Banyak data Lidar difilter. Turun: Sistem sensitif orang lewat.
    # 3. Range: 0.1 - 2.0 meter
    beam_skip_distance: 0.5

    # 1. Arti: Batas error matching peta agar sinar diabaikan.
    # 2. Dampak: Naik: Susah mengabaikan objek. Turun: Mudah menolak data tak ada di peta.
    # 3. Range: 0.0 - 1.0
    beam_skip_error_threshold: 0.9

    # 1. Arti: Persentase maksimum total scan yang boleh diabaikan.
    # 2. Dampak: Naik: Bisa abaikan keramaian. Turun: AMCL kaku ikut map statis.
    # 3. Range: 0.0 - 1.0
    beam_skip_threshold: 0.3

    # 1. Arti: Aktifkan filter objek tidak terpetakan (seperti orang jalan).
    # 2. Dampak: True: Baik untuk ruang ramai. False: Ringan di CPU.
    # 3. Range: true / false
    do_beamskip: false

    # 1. Arti: Nama frame untuk koordinat global/peta statis.
    # 2. Dampak: Salah penamaan membuat robot gagal sinkronisasi peta.
    # 3. Range: "map"
    global_frame_id: "map"

    # 1. Arti: Laju peluruhan eksponensial (deteksi pembacaan dekat tak terduga).
    # 2. Dampak: Naik: AMCL maklum noise depan. Turun: Rentan lost karena kaki orang.
    # 3. Range: 0.0 - 1.0
    lambda_short: 0.1

    # 1. Arti: Jarak inflasi maksimal di peta untuk mencocokkan Lidar.
    # 2. Dampak: Naik: Bisa recover posisi walau meleset. Turun: Harus sangat presisi.
    # 3. Range: 0.5 - 5.0 meter
    laser_likelihood_max_dist: 2.0

    # 1. Arti: Potong data Lidar yang lebih jauh dari nilai ini.
    # 2. Dampak: Naik: Ada referensi jauh (berat CPU). Turun: Fokus lokalisasi rintangan dekat.
    # 3. Range: > 0.0 meter (sesuai spesifikasi max Lidar, misal 10.0)
    laser_max_range: 10.0

    # 1. Arti: Abaikan scan terlalu dekat (kena body robot).
    # 2. Dampak: Naik: Abaikan objek dekat. Turun: Semua objek diproses.
    # 3. Range: -1.0 (unlimited) atau > 0.0 meter
    laser_min_range: -1.0

    # 1. Arti: Tipe algoritma komputasi error Lidar.
    # 2. Dampak: likelihood_field lebih mulus dan ringan daripada beam.
    # 3. Range: "likelihood_field" atau "beam"
    laser_model_type: "likelihood_field"

    # 1. Arti: Sinar Lidar yang disampel untuk lokalisasi.
    # 2. Dampak: Naik: Makin presisi tapi CPU bengkak drastis. Turun: Ringan tapi posisi loncat.
    # 3. Range: 30 - 100
    max_beams: 50

    # 1. Arti: Jumlah max tebakan posisi robot saat kebingungan (lost).
    # 2. Dampak: Naik: Akurasi recover tinggi tapi berat CPU. Turun: Cepat tapi gagal recover.
    # 3. Range: 1000 - 5000
    max_particles: 2000

    # 1. Arti: Jumlah minimum tebakan posisi saat robot yakin lokasinya.
    # 2. Dampak: Naik: Sangat stabil, CPU konstan. Turun: Hemat CPU tapi bisa meleset mendadak.
    # 3. Range: 100 - 1000
    min_particles: 500

    # 1. Arti: Koordinat referensi lokal odometri.
    # 2. Dampak: Salah penamaan mengakibatkan tf tree putus.
    # 3. Range: "odom"
    odom_frame_id: "odom"

    # 1. Arti: Tingkat error saat ambil kesimpulan partikel terbaik.
    # 2. Dampak: Naik: Partikel tersebar (tahan kidnapping). Turun: Konvergensi sangat cepat.
    # 3. Range: 0.0 - 0.1
    pf_err: 0.04

    # 1. Arti: Probabilitas threshold algoritma KLD.
    # 2. Dampak: Naik: Butuh banyak partikel untuk yakin. Turun: Cepat simpulkan lokasi.
    # 3. Range: 0.5 - 0.99
    pf_z: 0.99

    # 1. Arti: Seberapa cepat partikel disebar saat error odometri tiba-tiba besar.
    # 2. Dampak: Naik: Cepat sadar kalau robot digeser orang. Turun: Percaya buta odometri.
    # 3. Range: 0.0 - 0.1
    recovery_alpha_fast: 0.0

    # 1. Arti: Seberapa cepat partikel disebar saat error bertahap.
    # 2. Dampak: Naik: Sering reset partikel kecil-kecilan. Turun: Abaikan selip ringan.
    # 3. Range: 0.0 - 0.01
    recovery_alpha_slow: 0.0

    # 1. Arti: Siklus perulangan resampling partikel.
    # 2. Dampak: Naik: Jarang filter (CPU ringan). Turun: Real-time update map-to-odom tinggi.
    # 3. Range: 1 - 5
    resample_interval: 1

    # 1. Arti: Model kinematik robot.
    # 2. Dampak: DifferentialMotionModel mutlak untuk robot 2 roda independen.
    # 3. Range: "nav2_amcl::DifferentialMotionModel"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # 1. Arti: Kecepatan backup posisi akhir ke server (Hz).
    # 2. Dampak: Naik: Posisi restart lebih up-to-date. Turun: Hemat IO disk, tapi restart butuh init.
    # 3. Range: 0.1 - 1.0 Hz
    save_pose_rate: 0.5

    # 1. Arti: Toleransi ketidakakuratan jarak Lidar.
    # 2. Dampak: Naik: Menganggap Lidar punya banyak noise. Turun: Percaya Lidar 100% akurat.
    # 3. Range: 0.1 - 0.5 meter
    sigma_hit: 0.3

    # 1. Arti: Publish TF map -> odom.
    # 2. Dampak: Wajib True agar robot tahu posisi globalnya.
    # 3. Range: true / false
    tf_broadcast: true

    # 1. Arti: Toleransi lag network/CPU sebelum error TF.
    # 2. Dampak: Naik: Cegah crash saat CPU lag. Turun: Navigasi gagal seketika jika ada sedikit lag.
    # 3. Range: 0.1 - 2.0 detik
    transform_tolerance: 1.0

    # 1. Arti: Jarak putar minimal sebelum partikel dihitung ulang.
    # 2. Dampak: Naik: Hemat CPU, jarang kalkulasi. Turun: Belok dikit langsung kalkulasi.
    # 3. Range: 0.05 - 0.5 radian
    update_min_a: 0.05

    # 1. Arti: Jarak maju minimal sebelum partikel dihitung ulang.
    # 2. Dampak: Naik: Jarang kalkulasi (bisa nyasar pelan). Turun: Sering kalkulasi (akurat tapi berat).
    # 3. Range: 0.05 - 0.5 meter
    update_min_d: 0.05

    # 1. Arti: Bobot probabilitas Lidar menabrak tembok yang ada di map.
    # 2. Dampak: Naik: AMCL sangat mengandalkan map statis. Turun: Mudah terpengaruh lingkungan baru.
    # 3. Range: 0.0 - 1.0
    z_hit: 0.5

    # 1. Arti: Bobot probabilitas Lidar menembus udara kosong (tak memantul).
    # 2. Dampak: Naik: Menoleransi banyak ruang kosong atau pantulan kaca.
    # 3. Range: 0.0 - 1.0
    z_max: 0.05

    # 1. Arti: Probabilitas noise/benda asing acak.
    # 2. Dampak: Naik: Menerima ruang ramai orang. Turun: Lingkungan harus bersih sesuai map.
    # 3. Range: 0.0 - 1.0
    z_rand: 0.5

    # 1. Arti: Probabilitas sinar terpotong awal karena rintangan dadakan.
    # 2. Dampak: Naik: Toleran pada objek yang tiba-tiba melintas.
    # 3. Range: 0.0 - 1.0
    z_short: 0.05

    # 1. Arti: Topik Lidar untuk input AMCL.
    # 2. Dampak: Jika salah, robot tidak punya 'mata' untuk melokalisasi diri.
    # 3. Range: "/scan" atau "/scan_filtered"
    scan_topic: /scan

bt_navigator:
  ros__parameters:
    # 1. Arti: Sinkronisasi waktu dengan simulasi/hardware.
    # 2. Dampak: Jika tidak sinkron antar node, sistem TF akan crash.
    # 3. Range: true / false
    use_sim_time: false

    # 1. Arti: Frame referensi global untuk behavior tree.
    # 2. Dampak: Gagal loading navigasi jika frame salah.
    # 3. Range: "map"
    global_frame: map

    # 1. Arti: Frame titik sentral robot.
    # 2. Dampak: Jarak navigasi dan obstacle terhitung salah jika frame ini salah.
    # 3. Range: "base_link"
    robot_base_frame: base_link

    # 1. Arti: Sumber odometri dasar.
    # 2. Dampak: Navigasi akan error tanpa sumber posisi odom yang valid.
    # 3. Range: "/odom" atau "/odometry/filtered"
    odom_topic: /odometry/filtered

    # 1. Arti: Kecepatan evaluasi logika Behavior Tree.
    # 2. Dampak: Naik: Respon lambat (telat hindari orang). Turun: Respon instan tapi CPU overload.
    # 3. Range: 10 - 100 milidetik
    bt_loop_duration: 100

    # 1. Arti: Batas waktu tunggu action server.
    # 2. Dampak: Naik: Aman untuk CPU lambat (tak gampang timeout). Turun: Mudah gagal (abort).
    # 3. Range: 100 - 5000 ms
    default_server_timeout: 2000

    # 1. Arti: Batas waktu tunggu saat service start.
    # 2. Dampak: Naik: Mengakomodir lag awal koneksi. Turun: Mudah gagal jika network lambat.
    # 3. Range: 500 - 2000 ms
    wait_for_service_timeout: 1000

    # 1. Arti: Daftar library plugins Behavior Tree.
    # 2. Dampak: Jika kurang/dihapus, logic navigasi BT (.xml) gagal diload.
    # 3. Range: Daftar nama plugin valid ROS2 Nav2.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      
bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    # 1. Arti: Sinkronisasi waktu.
    # 2. Dampak: Harus selaras dengan sistem (biasanya false u/ hardware asli).
    # 3. Range: true / false
    use_sim_time: false
    odom_topic: "/odometry/filtered"

    # 1. Arti: Frekuensi controller mengkalkulasi kecepatan gerak robot.
    # 2. Dampak: Naik: Gerakan lebih luwes, CPU berat. Turun: Gerakan kaku, rawan telat hindari rintangan.
    # 3. Range: 5.0 - 20.0 Hz
    controller_frequency: 5.0

    # 1. Arti: Toleransi jumlah kegagalan berturut-turut sebelum menyerah/abort.
    # 2. Dampak: Naik: Mencoba terus walau gagal gerak. Turun: Mudah masuk mode recovery.
    # 3. Range: 1.0 - 5.0
    failure_tolerance: 3.0

    # 1. Arti: Daftar plugin progress checker.
    # 2. Dampak: Mengawasi apakah robot beneran maju menuju titik gol (bukan diam di tempat).
    # 3. Range: ["progress_checker"]
    progress_checker_plugins: ["progress_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 1. Arti: Minimal jarak yang harus ditempuh sebagai bukti robot "making progress".
      # 2. Dampak: Naik: Robot harus gerak jauh. Turun: Sangat toleran jika robot lelet/nyelip sedikit.
      # 3. Range: 0.1 - 0.5 meter
      required_movement_radius: 0.1

      # 1. Arti: Waktu maksimal yang diberikan untuk mencapai radius gerak di atas.
      # 2. Dampak: Naik: Mencegah abort dini pada motor delay startup. Turun: Cepat membatalkan navigasi jika macet.
      # 3. Range: 10.0 - 40.0 detik
      movement_time_allowance: 40.0

    # 1. Arti: Daftar plugin untuk mendeteksi apakah goal tercapai.
    # 2. Dampak: Mengatur penyelesaian navigasi.
    # 3. Range: ["goal_checker"]
    goal_checker_plugins: ["goal_checker"]

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # 1. Arti: Toleransi error posisi XY (radius) untuk menganggap goal selesai.
      # 2. Dampak: Naik: Berhenti jauh dari titik persis target. Turun: Muter-muter cari presisi tinggi.
      # 3. Range: 0.1 - 0.5 meter
      xy_goal_tolerance: 0.25

      # 1. Arti: Toleransi error sudut rotasi (yaw) di titik goal.
      # 2. Dampak: Naik: Boleh hadap miring di tujuan. Turun: Harus presisi mutlak.
      # 3. Range: 0.1 - 0.5 radian
      yaw_goal_tolerance: 0.25

      # 1. Arti: Apakah checker menyimpan status perputaran robot yang telah dilakukan.
      # 2. Dampak: True: Cegah osilasi/getaran saat nyaris tiba.
      # 3. Range: true / false
      stateful: true

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      # 1. Arti: Jumlah iterasi lompatan prediksi ke depan (Time Horizon).
      # 2. Dampak: Naik: Prediksi lebih jauh, sangat berat di CPU. Turun: Pandangan terlalu jangka pendek (bisa nabrak).
      # 3. Range: 5 - 30 langkah
      time_steps: 8

      # 1. Arti: Interval waktu per langkah prediksi MPPI.
      # 2. Dampak: Naik: MPPI menerka terlalu jauh antar langkah (kasar). Turun: MPPI menebak halus tapi lambat komputasi.
      # 3. Range: 0.05 - 0.5 detik
      model_dt: 0.2

      # 1. Arti: Jumlah acak simulasi lintasan yang dihitung berbarengan.
      # 2. Dampak: Naik: Makin luwes hindari rintangan, tapi sangat sangat berat di CPU.
      # 3. Range: 500 - 2000 lintasan
      batch_size: 1000

      # 1. Arti: Deviasi standar acak sampling kecepatan maju (X).
      # 2. Dampak: Naik: Trajectory acak panjang-pendeknya lebih variatif. Turun: Trajectory hanya kumpul di 1 titik jarak konstan.
      # 3. Range: 0.1 - 0.5
      vx_std: 0.25

      # 1. Arti: Deviasi standar acak sampling kecepatan samping (Y).
      # 2. Dampak: Hanya untuk Omni wheel, abaikan/0 untuk Diff drive.
      # 3. Range: 0.0
      vy_std: 0.0

      # 1. Arti: Deviasi standar acak sampling kecepatan rotasi (Theta/Yaw).
      # 2. Dampak: Naik: Tebakan rute menyebar luas kiri/kanan. Turun: Hanya cenderung jalan lurus ke depan.
      # 3. Range: 0.1 - 1.0
      wz_std: 0.4

      # 1. Arti: Batas absolut kecepatan maju teratas.
      # 2. Dampak: Naik: Robot diizinkan jalan sangat ngebut.
      # 3. Range: 0.5 - 1.5 m/s
      vx_max: 0.5

      # 1. Arti: Kecepatan mundur max (negatif).
      # 2. Dampak: Membatasi robot mundur terlampau cepat (0.0 jika diharamkan mundur).
      # 3. Range: -0.5 - 0.0 m/s
      vx_min: -0.5

      # 1. Arti: Kecepatan samping max.
      # 2. Dampak: DDMR nol mutlak.
      # 3. Range: 0.0
      vy_max: 0.0

      # 1. Arti: Kecepatan rotasi max.
      # 2. Dampak: Naik: Robot diizinkan berbelok sangat tajam dan cepat.
      # 3. Range: 0.5 - 3.0 rad/s
      wz_max: 0.25


      # 1. Arti: Akselerasi maju max (pijakan gas).
      # 2. Dampak: Naik: Sentakan start robot sangat keras.
      # 3. Range: 1.0 - 5.0
      ax_max: 5.0

      # 1. Arti: Akselerasi mundur (pengereman mundur).
      # 2. Dampak: Naik (negatif tinggi): Ngerem rem mendadak mundur kasar.
      # 3. Range: -5.0 - -1.0
      ax_min: -5.0

      # 1. Arti: Akselerasi samping.
      # 2. Dampak: DDMR nol.
      # 3. Range: 0.0
      ay_min: -0.0
      ay_max: 0.0

      # 1. Arti: Akselerasi perputaran.
      # 2. Dampak: Naik: Robot seketika memutar tajam.
      # 3. Range: 1.0 - 5.0
      az_max: 2.0

      # 1. Arti: Jumlah perulangan pemurnian (refinement) MPPI mencari jalan terbaik.
      # 2. Dampak: Naik: Rute mulus sempurna tapi CPU makan gila-gilaan.
      # 3. Range: 1 - 3
      iteration_count: 1

      # 1. Arti: Temperatur entropi pemilihan (Keseimbangan acak vs patuh rute map).
      # 2. Dampak: Naik: MPPI gampang pindah jalur (nyari jalan aneh). Turun: Konstan mengikuti 1 garis jalur paling murah.
      # 3. Range: 0.1 - 0.5
      temperature: 0.2

      # 1. Arti: Faktor diskon evaluasi horizon (future reward).
      # 2. Dampak: Naik: Sangat memikirkan ujung jalan dari trajectory. Turun: Memikirkan kemudahan jalan persis di depan mata.
      # 3. Range: 0.01 - 0.1
      gamma: 0.02

      # 1. Arti: Model simulasi kinematik gerak.
      # 2. Dampak: Jika bukan DiffDrive pada robot 2 roda, tebakan jalur di MPPI akan ngawur (mustahil dicapai robot fisik).
      # 3. Range: "DiffDrive"
      motion_model: "DiffDrive"

      diff_drive:
        plugin: "mppi::DiffDriveMotionModel"

      # 1. Arti: Publish poin-poin acak prediksi untuk RViz.
      # 2. Dampak: True: RViz ada bulu/akar hijau lintasan MPPI, tapi makan network dan grafis berat.
      # 3. Range: true / false
      visualize: false

      critic_index_to_visualize: 0
      reset_period: 1.0 # (only in Humble)
      regenerate_noises: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 1.0
        # 1. Arti: Menggunakan geometri polygon kotak dalam mengecek tebakan tabrakan.
        # 2. Dampak: Wajib True untuk robot berdimensi kotak, agar aman tidak menyerempet pinggiran tembok.
        # 3. Range: true / false
        consider_footprint: true

      # 1. Arti: Daftar "juri" yang memberi skor hukuman (cost) pada setiap lintasan acak.
      # 2. Dampak: Kehilangan 1 juri dapat menyebabkan behavior fatal (misal mencoret ObstaclesCritic -> robot nekad nabrak).
      # 3. Range: Kombinasi plugins Critic
      critics: ["ConstraintCritic", "ObstaclesCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic", "VelocityDeadbandCritic"]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Hukuman untuk melanggar batas kecepatan kinematik robot.
        # 2. Dampak: Naik: MPPI tak berani mengabaikan max_vel/max_acc.
        # 3. Range: 1.0 - 10.0
        cost_weight: 3.0

      GoalCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Hukuman untuk tebakan lintasan yang menjauhi target koordinat akhir.
        # 2. Dampak: Naik: Robot fokus jalan ngebut agresif ke titik ujung.
        # 3. Range: 1.0 - 10.0
        cost_weight: 7.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Hukuman untuk lintasan yang orientasinya tidak sejajar orientasi akhir.
        # 2. Dampak: Naik: Merapikan sudut belokan ketika sudah sangat dekat dengan target.
        # 3. Range: 1.0 - 10.0
        cost_weight: 5.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Penalti untuk pergerakan ke arah belakang (mundur).
        # 2. Dampak: Naik: Robot pantang mundur (lebih milih muter haluan).
        # 3. Range: 1.0 - 10.0
        cost_weight: 7.0
        threshold_to_consider: 0.5

      ObstaclesCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Gaya dorong menjauhi segala obstacle padat di peta.
        # 2. Dampak: Naik: Robot ogah jalan di pinggir tembok dan memaksa jalan murni di tengah koridor.
        # 3. Range: 1.0 - 10.0
        repulsion_weight: 2.0
        critical_weight: 20.0
        consider_footprint: true
        collision_cost: 10000.0
        collision_margin_distance: 0.05
        near_goal_distance: 0.5
        inflation_radius: 0.2
        cost_scaling_factor: 20.0

      CostCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Hukuman atas nilai costmap (awan inflasi di peta).
        # 2. Dampak: Naik: Robot menjaga diri dari kawasan zona abu-abu.
        # 3. Range: 1.0 - 10.0
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      PathAlignCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Hukuman lintasan yang lari/melenceng jauh dari jalur global planner.
        # 2. Dampak: Naik: Sangat lengket taat garis merah rute utama. Turun: Punya kebebasan cari belokan mulus sendiri.
        # 3. Range: 5.0 - 30.0
        cost_weight: 20.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 5
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Serupa PathAlign, tapi terfokus ke titik target point di depan robot terdekat.
        # 2. Dampak: Naik: Selalu ngejar titik depannya agar tak lari rute.
        # 3. Range: 1.0 - 10.0
        cost_weight: 10.0         
        offset_from_furthest: 3   
        threshold_to_consider: 1.0

      PathAngleCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Memaksa robot membelok badannya menyesuaikan tikungan global path.
        # 2. Dampak: Naik: Belokan robot terprediksi halus seperti arah kurva global planner.
        # 3. Range: 1.0 - 5.0
        cost_weight: 5.0
        offset_from_furthest: 3
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        # 1. Arti: Penalti sangat berat untuk mencegah sampling rute dengan kecepatan tak kasat mata (di bawah daya angkat dinamo).
        # 2. Dampak: Menjamin MPPI tidak mengirim sinyal mikro ke cmd_vel.
        # 3. Range: 20.0 - 50.0 (Harus dominan)
        cost_weight: 40.0
        
        # 1. Arti: Ambang bawah kecepatan yang tak bisa dijalankan motor robot (kecepatan mati).
        # 2. Dampak: MPPI hanya diperbolehkan merekomendasi gerak melebihi rentang nilai deadband ini.
        # 3. Range: Sesuai observasi motor riil (misal 0.3 m/s)
        deadband_velocities: [0.2, 0.0, 0.15]
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      # 1. Arti: Sim time flag.
      # 2. Dampak: True untuk simulasi, False u/ riil.
      # 3. Range: true / false
      use_sim_time: false

      # 1. Arti: Frekuensi memperbarui rintangan Lidar di peta lokal.
      # 2. Dampak: Naik: Lidar respons sangat cepat (berat CPU). Turun: Hemat tapi rintangan dinamis agak lambat muncul.
      # 3. Range: 3.0 - 10.0 Hz
      update_frequency: 3.0

      # 1. Arti: Frekuensi menayangkan (publish) update costmap ke ROS topics.
      # 2. Dampak: Turun: Jaringan lebih ringan tanpa ngaruh ke jalan robot.
      # 3. Range: 1.0 - 5.0 Hz
      publish_frequency: 1.0

      # 1. Arti: Frame referensi map ini.
      # 2. Dampak: Wajib 'odom' agar smooth, tidak patah2 saat AMCL re-kalkulasi pose.
      # 3. Range: "odom"
      global_frame: odom

      # 1. Arti: Frame target center untuk digabungkan peta lokalnya.
      # 2. Dampak: Frame robot tempat Lidar berpusat.
      # 3. Range: "base_link"
      robot_base_frame: base_link

      # 1. Arti: Peta berjalan dinamis ngikutin si robot.
      # 2. Dampak: Wajib true agar pandangan Lidar selalu geser selaras pergerakan robot.
      # 3. Range: true
      rolling_window: true

      # 1. Arti: Ukuran luas kotak virtual Lidar (X, Y dalam meter).
      # 2. Dampak: Naik: MPPI bisa melihat obstacle lebih jauh. Turun: Peta sempit, memori sangat hemat.
      # 3. Range: 3.0 - 5.0 meter
      width: 4
      height: 4

      # 1. Arti: Resolusi per kotak grid (meter).
      # 2. Dampak: Turun: Sangat mendetail dan mulus pinggir temboknya tapi memakan memori super besar.
      # 3. Range: 0.05 m (5 cm)
      resolution: 0.05

      # 1. Arti: Batas telat time out baca TF base to odom.
      # 2. Dampak: Naik: Cegah node local_costmap freeze pas komputasi sedang padat/ngelag di PC kecil.
      # 3. Range: 0.5 - 2.0 detik
      transform_tolerance: 1.0

      # 1. Arti: Garis perimeter dimensi fisik sasis robot.
      # 2. Dampak: Sangat krusial agar robot panjang tidak memotong belokan tiang dari samping/body mepet.
      # 3. Range: Array titik [X,Y] meter.
      footprint: "[[0.57, 0.21], [0.57, -0.21], [-0.57, -0.21], [-0.57, 0.21]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      filters: ["keepout_filter"]

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "keepout_costmap_filter_info"
        transform_tolerance: 0.2

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 1. Arti: Tingkat kelandaian/penurunan harga cost zona bahaya dekat benda solid.
        # 2. Dampak: Naik (curam): Zona rintangan sangat ketat ke halangan fisik, pinggirannya langsung putih/aman.
        # 3. Range: 2.0 - 15.0
        cost_scaling_factor: 10.0

        # 1. Arti: Jarak sejauh mana aura bahaya memancar dari tembok/benda solid.
        # 2. Dampak: Naik: Ruang lorong akan nampak sempit/abu-abu semua.
        # 3. Range: 0.1 - 1.0 m
        inflation_radius: 0.25

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          # 1. Arti: Jarak Lidar menembak menghapus status 'ada rintangan' yang berlalu.
          # 2. Dampak: Kalau ada orang jalan menjauh, jejak hantunya di costmap hilang s.d jarak ini.
          # 3. Range: Harus >= max_range Lidar (misal 3.0)
          raytrace_max_range: 3.0
          raytrace_min_range: 0.05

          # 1. Arti: Jarak masuknya data Lidar jadi benda padat baru di map lokal.
          # 2. Dampak: Naik: Obstacle nampak jauh duluan, CPU terbebani.
          # 3. Range: 2.0 - 5.0
          obstacle_max_range: 2.50
          obstacle_min_range: 0.05
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      # 1. Arti: Sim time flag.
      # 2. Dampak: True u/ Gazebo.
      # 3. Range: true / false
      use_sim_time: false

      # 1. Arti: Kecepatan memproses ulang map statis besar.
      # 2. Dampak: Sangat hemat disetel kecil karena peta bangunan rata-rata tidak berubah bentuk.
      # 3. Range: 0.1 - 2.0 Hz
      update_frequency: 0.5
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      
      # 1. Arti: Toleransi TF map to odom.
      # 2. Dampak: Naik: Mengurangi error timeout tf saat map_server lag.
      # 3. Range: 0.5 - 2.0
      transform_tolerance: 1.0
      resolution: 0.05
      track_unknown_space: true
      
      footprint: "[[0.58, 0.22], [0.58, -0.22], [-0.58, -0.22], [-0.58, 0.22]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      filters: ["keepout_filter"]

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "keepout_costmap_filter_info"
        transform_tolerance: 0.2

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.05
          obstacle_max_range: 2.5
          obstacle_min_range: 0.05

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 1. Arti: Kelandaian zona abu-abu di rute statis.
        # 2. Dampak: Nilai 10.0 super berguna cegah jalan buntu semu (cyan bloat).
        # 3. Range: 2.0 - 15.0
        cost_scaling_factor: 5.0

        # 1. Arti: Radius batas zona bahaya menjauh dari batas tembok statis.
        # 2. Dampak: Robot tak berani ambil rute terlalu dempet tembok.
        # 3. Range: 0.2 - 1.0 m
        inflation_radius: 0.25
      always_send_full_costmap: true

collision_monitor:
  ros__parameters:
    # 1. Arti: Sim time flag.
    # 2. Dampak: False u/ robot fisik.
    # 3. Range: true / false
    use_sim_time: false

    # 1. Arti: Switch on/off node monitor anti-tabrak cerdas.
    # 2. Dampak: Jika True, robot bisa ngerem sendiri walau Nav2 nyuruh jalan.
    # 3. Range: true / false
    enabled: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    odom_topic: "/odometry/filtered"
    
    # 1. Arti: Topik tangkapan kecepatan original dari controller Nav2.
    # 2. Dampak: Collision monitor mensadap rute cmd ini sbg masukannya.
    # 3. Range: "cmd_vel_raw"
    cmd_vel_in_topic: "cmd_vel_raw"
    
    # 1. Arti: Topik hasil olahan kecepatan final menuju motor.
    # 2. Dampak: Jika zona stop kepotong orang, nilai ini jadi 0,0,0 m/s.
    # 3. Range: "cmd_vel"
    cmd_vel_out_topic: "cmd_vel_auto"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.3
    source_timeout: 0.5
    base_shift_correction: true
    stop_pub_timeout: 2.0
    enable_stamped_cmd_vel: false
    polygons: ["PolygonStop", "PolygonSlow"]

    PolygonStop:
      type: "polygon"
      # 1. Arti: Bentuk geometri merah untuk intervensi REM MENDADAK.
      # 2. Dampak: Setiap ada rintangan masuk dalam kotak ini, kecepatan fix 0 m/s.
      # 3. Range: Daftar koordinat X,Y polygon meter.
      points: "[[0.75, 0.30], [0.75, -0.30], [0.10, -0.30], [0.10, 0.30]]"
      action_type: "stop"
      max_points: 3
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true

    PolygonSlow:
      type: "polygon"
      # 1. Arti: Bentuk geometri kuning area peringatan/pelan pelan.
      # 2. Dampak: Mengelilingi area Stop. Jika masuk, kecepatan hanya diturunkan persenan.
      # 3. Range: Daftar koordinat polygon.
      points: "[[1.10, 0.40], [1.10, -0.40], [0.05, -0.40], [0.05, 0.40]]"
      action_type: "slowdown"
      max_points: 3
      min_points: 4
      # 1. Arti: Persentase diskon kecepatan di zona kuning.
      # 2. Dampak: 0.50 mengurangi kecepatan menjadi separuhnya (jadi tak nabrak).
      # 3. Range: 0.1 - 0.9
      slowdown_ratio: 0.50
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      source_timeout: 0.3
      enabled: true

map_server:
  ros__parameters:
    use_sim_time: false
    # 1. Arti: Lokasi mutlak file denah bangunan (.yaml statis map).
    # 2. Dampak: Gagal dimuat bila directory typo, robot tak punya referensi map.
    # 3. Range: "/path/to/file.yaml"
    yaml_filename: "/home/arya/arya_ws/src/amr_bringup/maps/21apr.yaml"

keepout_filter_mask_server:
  ros__parameters:
    use_sim_time: false
    topic_name: "keepout_filter_mask"
    frame_id: "map"
    yaml_filename: ""

keepout_costmap_filter_info_server:
  ros__parameters:
    use_sim_time: false
    type: 0
    filter_info_topic: "keepout_costmap_filter_info"
    mask_topic: "keepout_filter_mask"
    base: 0.0
    multiplier: 1.0

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: false
    # 1. Arti: Target detak frekuensi loop planner garis global.
    # 2. Dampak: Naik: Lincah respon ada tembok baru (CPU membengkak). Turun: Cukup ideal 2Hz asal Lidar tak banyak delay.
    # 3. Range: 1.0 - 5.0 Hz
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      # 1. Arti: Angka toleransi jarak gap yang dibolehkan saat meraba finish goal dekat tembok.
      # 2. Dampak: Naik: Bisa ke spot yg agak nyangkut tembok/area sempit. Turun: Wajib bersih persis di map putih.
      # 3. Range: 0.1 - 1.0 meter
      tolerance: 0.35
      
      # 1. Arti: Mode planner boleh menarik garis lewat wilayah abu-abu/tak terdeteksi Lidar.
      # 2. Dampak: True: Berani cari jalan pintas di luar map statis. False: Kolot/kaku ikuti map.
      # 3. Range: true / false
      allow_unknown: true
      
      # 1. Arti: Maksimum tebakan iterasi pencarian simpul arah Smac.
      # 2. Dampak: Naik: Bisa buat jalan memutar sangat jauh. Turun: Peta ruwet dikit lapor gagal.
      # 3. Range: 50000 - 500000
      max_iterations: 200000
      max_on_approach_iterations: 500
      
      # 1. Arti: Waktu toleransi memeras otak PC untuk cari jalur sukses sebelum Give Up.
      # 2. Dampak: Naik: Aman untuk peta super luas tapi user kelamaan nunggu gerak.
      # 3. Range: 1.0 - 5.0 dtk
      max_planning_time: 1.5
      
      analytic_expansion_ratio: 2.0
      analytic_expansion_max_length: 1.5
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      
      # 1. Arti: Hukuman untuk mencari rute maju-mundur.
      # 2. Dampak: Planner menjauhi membiarkan robot mengambil solusi 'mundur' dan memaksanya memutar u-turn.
      # 3. Range: 1.5 - 5.0
      reverse_penalty: 2.0
      
      change_penalty: 0.05
      non_straight_penalty: 1.05
      cost_penalty: 1.3
      
      # 1. Arti: Hukuman pada rute dengan banyak tikungan putar.
      # 2. Dampak: Naik: Planner berusaha bikin jalur yg sesedikit mungkin belok tajam, se-linier mungkin.
      # 3. Range: 1.5 - 5.0
      rotation_penalty: 3.0
      retrospective_penalty: 0.015
      
      # 1. Arti: File konfigurasi radius kinematika rotasi dari Smac.
      # 2. Dampak: Menjamin panah garis jalur merah planner benar-benar bisa ditempuh roda fisik (ada tikungan min radius).
      # 3. Range: /path/to/lattice/json
      lattice_filepath: "/opt/ros/humble/share/nav2_smac_planner/sample_primitives/5cm_resolution/0.5m_turning_radius/diff/output.json"
      
      lookup_table_size: 10.0
      cache_obstacle_heuristic: false
      
      # 1. Arti: Flag boleh menghasilkan arah mundur pada Smac global path.
      # 2. Dampak: True: Ada kalanya robot disuruh mundur di lorong buntuh. False: Wajib u-turn aja.
      # 3. Range: true / false
      allow_reverse_expansion: true
      smooth_path: false
      smoother:
        max_iterations: 200
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: false
        refinement_num: 0

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    # 1. Arti: Frekuensi kecepatan evaluasi kelangsungan recovery behavior (Spin, Backup dll).
    # 2. Dampak: Diturunkan jadi 3Hz agar PC tak ngehang pas sedang stress recovery.
    # 3. Range: 2.0 - 10.0 Hz
    cycle_frequency: 3.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: "/odometry/filtered"
    
    # 1. Arti: Toleransi timeout data TF odom-base_link.
    # 2. Dampak: Dinaikkan pesat (1.5) agar tidak ada tragedi "backup failed" karena PC lambat mem-publish TF saat robot stuck.
    # 3. Range: 0.5 - 2.0 detik
    transform_tolerance: 1.5
    simulate_ahead_time: 2.0
    
    # 1. Arti: Kecepatan memutar pada behavior Spin.
    # 2. Dampak: 1.0 rad/s (cepat) meminimalkan lama waktu recovery spin sehingga robot lekas jalan lagi.
    # 3. Range: 0.5 - 2.0 rad/s
    max_rotational_vel: 1.0
    min_rotational_vel: 0.15
    rotational_acc_lim: 1.5

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    # 1. Arti: Detak evaluasi task waypoint follower.
    # 2. Dampak: Angka 20 wajar untuk responsivitas sampai stasiun titik.
    # 3. Range: 10 - 50 Hz
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      # 1. Arti: Opsi mengeset jeda berdiam diri tiap kali menyentuh waypoint sblum lanjut ke waypoint brikutnya.
      # 2. Dampak: Berguna bagi AMR logistik (nunggu muatan diturunkan).
      # 3. Range: 0 - 60000 milidetik/detik sesuai setting behavior tree
      waypoint_pause_duration: 0

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ["map_server", "amcl"]

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    # 1. Arti: Tingkat perataan gelombang instruksi kecepatan dari MPPI ke motor riil.
    # 2. Dampak: 10Hz cukup menengahi command putus-putus menjadi aliran tegangan mulus ke inverter motor.
    # 3. Range: 5.0 - 50.0 Hz
    smoothing_frequency: 10.0
    scale_velocities: true
    
    # 1. Arti: Mode pantauan untuk menghaluskan output. OPEN_LOOP / CLOSED_LOOP.
    # 2. Dampak: KRITIS: Gunakan OPEN_LOOP u/ sistem dengan delay (krn odom belum maju, ntar dibilang gagal mutar).
    # 3. Range: "OPEN_LOOP" atau "CLOSED_LOOP"
    feedback: "OPEN_LOOP"
    
    # 1. Arti: Top plafon kecepataan tertinggi yg bisa terlewati.
    # 2. Dampak: Sbg filter batas keamanan terakhir agar mikrokontroller tidak gila jika Nav2 ngirim vel aneh.
    # 3. Range: [X, Y, Yaw] (0.5 - 2.0 m/s)
    max_velocity: [0.5, 0.0, 0.5]
    min_velocity: [-0.5, 0.0, -0.5]
    
    # 1. Arti: Akselerasi max yg diizinkan diteruskan ke roda.
    # 2. Dampak: Ramp-up dibatasi jadi mulus agar roda tidak selip mendadak mencungkil aspal/lantai.
    # 3. Range: [X_acc, Y_acc, Yaw_acc]
    max_accel: [5.0, 0.0, 2.0]
    
    # 1. Arti: Deselerasi negatif (rem) max.
    # 2. Dampak: Lebih curam/besar dibanding akselerasi agar saat awas ngerem bisa pakem mendadak.
    # 3. Range: [-5.0 - -1.0]
    max_decel: [-5.0, 0.0, -5.0]
    odom_topic: "odometry/filtered"
    odom_duration: 0.1
    
    # 1. Arti: Ambang toleransi pelan minimal (di bawah batas putar wajar dinamo/encoder resolusi).
    # 2. Dampak: Nol agar smoother tidak memotong command kecil valid menjadi 0; kompensasi minimum ada di motor_driver.
    # 3. Range: [X_min, Y_min, Yaw_min]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
