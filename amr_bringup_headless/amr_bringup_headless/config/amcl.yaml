amcl:
  ros__parameters:
    use_sim_time: false

    alpha1: 0.2
    alpha2: 0.25
    alpha3: 0.3
    alpha4: 0.2
    alpha5: 0.2

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: /scan
    tf_broadcast: true
    transform_tolerance: 1.0

    min_particles: 1000
    max_particles: 3000
    resample_interval: 1

    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.10
    laser_likelihood_max_dist: 2.0

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    update_min_a: 0.05
    update_min_d: 0.05

    set_initial_pose: false
    always_reset_initial_pose: false

    # initial_pose:
    #   x: 0.0
    #   y: 0.0
    #   z: 0.0
    #   yaw: 0.0

# map_server:
#   ros__parameters:
#     use_sim_time: false
#     yaml_filename: "/home/arya/arya_ws/src/amr_bringup/maps/map17apr.yaml"

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ["map_server", "amcl"]
